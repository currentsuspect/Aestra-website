<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="50%" stop-color="#0f0820"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.06" stroke="#a78bfa" stroke-width="0.5" fill="none">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80"  y1="0" x2="80"  y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <g transform="translate(60 80)" opacity="0.85">
    <rect x="0" y="0" width="1080" height="470" rx="20" fill="#0a0a0b" stroke="#1f1f23" stroke-width="1"/>
    <rect x="0" y="0" width="1080" height="40" rx="20" fill="#101012"/>
    <rect x="0" y="20" width="1080" height="20" fill="#101012"/>
    <circle cx="20" cy="20" r="5" fill="#27272a"/>
    <circle cx="40" cy="20" r="5" fill="#27272a"/>
    <circle cx="60" cy="20" r="5" fill="#27272a"/>
    <text x="540" y="25" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#52525b" text-anchor="middle">Aestra — current project</text>

    <g transform="translate(0 40)">
      <rect x="0" y="0" width="180" height="430" fill="#0a0a0b"/>
      <line x1="180" y1="0" x2="180" y2="430" stroke="#1f1f23" stroke-width="1"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#71717a">
        <text x="14" y="22">Packs</text>
        <text x="28" y="44">▸ 808s</text>
        <text x="28" y="62">▾ User Library</text>
        <text x="42" y="80">kick.flac</text>
        <text x="42" y="98">snare.flac</text>
        <text x="42" y="116">hat.flac</text>
        <text x="28" y="138">▸ Kits</text>
      </g>
    </g>

    <g transform="translate(180 40)">
      <rect x="0" y="0" width="900" height="430" fill="#050507"/>

      <g transform="translate(0 8)">
        <rect x="0" y="0" width="900" height="6" rx="2" fill="url(#violet)" opacity="0.8"/>
      </g>

      <g transform="translate(0 18)">
        <rect x="0" y="0" width="900" height="22" fill="#101012"/>
        <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#52525b">
          <text x="14" y="15">1</text>
          <text x="38" y="15">2</text>
          <text x="62" y="15">3</text>
          <text x="86" y="15">4</text>
          <text x="110" y="15">5</text>
          <text x="134" y="15">6</text>
          <text x="158" y="15">7</text>
          <text x="182" y="15">8</text>
        </g>
        <line x1="0" y1="22" x2="900" y2="22" stroke="#27272a" stroke-width="0.5"/>
      </g>

      <g transform="translate(0 44)">
        <text x="0" y="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#71717a">Track1</text>
        <line x1="40" y1="0" x2="40" y2="380" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
        <g transform="translate(60 8)">
          <rect x="0" y="0" width="80" height="20" rx="3" fill="url(#track)" opacity="0.85"/>
          <rect x="120" y="0" width="40" height="20" rx="3" fill="url(#track)" opacity="0.85"/>
          <rect x="200" y="0" width="120" height="20" rx="3" fill="url(#track)" opacity="0.85"/>
          <rect x="360" y="0" width="60" height="20" rx="3" fill="url(#track)" opacity="0.85"/>
          <rect x="460" y="0" width="100" height="20" rx="3" fill="url(#track)" opacity="0.85"/>
        </g>
      </g>

      <g transform="translate(0 78)">
        <text x="0" y="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#71717a">Track2</text>
        <g transform="translate(60 8)" fill="#2dd4bf" opacity="0.75">
          <rect x="0" y="0" width="60" height="20" rx="3"/>
          <rect x="80" y="0" width="80" height="20" rx="3"/>
          <rect x="200" y="0" width="40" height="20" rx="3"/>
          <rect x="280" y="0" width="120" height="20" rx="3"/>
        </g>
      </g>

      <g transform="translate(0 112)">
        <text x="0" y="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#52525b">Pattern A</text>
        <g transform="translate(60 6)" fill="#27272a">
          <rect x="0" y="0" width="6" height="14" rx="1"/>
          <rect x="40" y="0" width="6" height="14" rx="1"/>
          <rect x="80" y="0" width="6" height="14" rx="1"/>
          <rect x="160" y="0" width="6" height="14" rx="1"/>
          <rect x="240" y="0" width="6" height="14" rx="1"/>
          <rect x="320" y="0" width="6" height="14" rx="1"/>
        </g>
      </g>

      <line x1="180" y1="14" x2="180" y2="430" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
      <circle cx="180" cy="14" r="6" fill="#a78bfa" stroke="#fff" stroke-width="1"/>
    </g>
  </g>

  <g transform="translate(80 70)" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(0 0)">
      <circle cx="14" cy="14" r="14" fill="url(#violet)"/>
      <g transform="translate(14 14)" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M -7 3 L -3 -1 L 1 3 L 5 -3"/>
      </g>
    </g>
    <text x="38" y="19" font-size="20" font-weight="600" fill="#fafafa">Aestra</text>
  </g>

  <g transform="translate(80 280)" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="0" y="0" font-size="86" font-weight="800" fill="#fafafa" letter-spacing="-3">Make music,</text>
    <text x="0" y="92" font-size="86" font-weight="800" letter-spacing="-3">
      <tspan fill="#fafafa">not </tspan><tspan fill="url(#violet)">excuses</tspan><tspan fill="#a78bfa">.</tspan>
    </text>
    <text x="0" y="148" font-size="20" fill="#a1a1aa" font-weight="500">A native C++ digital audio workstation.</text>
    <text x="0" y="174" font-size="20" fill="#a1a1aa" font-weight="500">Free core. Cross-platform. No feature gates.</text>
  </g>

  <g transform="translate(80 530)" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g fill="#a1a1aa" font-size="14" font-weight="500">
      <text x="0" y="0">aestra.studio</text>
      <text x="180" y="0" opacity="0.5">·</text>
      <text x="200" y="0">v0.1.1</text>
      <text x="260" y="0" opacity="0.5">·</text>
      <text x="280" y="0">Windows · macOS · Linux</text>
    </g>
  </g>
</svg>
